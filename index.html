<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black">
  <meta name="apple-mobile-web-app-title" content="睡眠記録">
  <link rel="apple-touch-icon" href="icon.png">
  <title>睡眠記録</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #fff;
      --fg: #000;
      --muted: #888;
      --border: #ddd;
      --btn-bg: #000;
      --btn-fg: #fff;
      --btn-outline-bg: #fff;
      --btn-outline-fg: #000;
      --card-bg: #f8f8f8;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Helvetica Neue', sans-serif;
      background: var(--bg);
      color: var(--fg);
      min-height: 100dvh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 24px 20px;
      -webkit-tap-highlight-color: transparent;
    }

    h1 {
      font-size: 18px;
      font-weight: 600;
      letter-spacing: 0.05em;
      margin-bottom: 40px;
      color: var(--muted);
    }

    #main, #prep, #done, #settings { width: 100%; max-width: 320px; text-align: center; }

    .time-display {
      font-size: 56px;
      font-weight: 200;
      letter-spacing: -2px;
      line-height: 1;
      margin-bottom: 6px;
    }
    .date-display {
      font-size: 14px;
      color: var(--muted);
      margin-bottom: 48px;
    }

    .btn {
      display: block;
      width: 100%;
      padding: 18px;
      border-radius: 14px;
      font-size: 17px;
      font-weight: 600;
      border: none;
      cursor: pointer;
      transition: opacity 0.15s;
      -webkit-appearance: none;
    }
    .btn:active { opacity: 0.6; }
    .btn-primary { background: var(--btn-bg); color: var(--btn-fg); }
    .btn-outline {
      background: var(--btn-outline-bg);
      color: var(--btn-outline-fg);
      border: 2px solid var(--fg);
      margin-top: 14px;
    }
    .btn-small {
      font-size: 14px;
      padding: 12px;
      margin-top: 10px;
    }
    .btn-ghost {
      background: none;
      border: none;
      color: var(--muted);
      font-size: 14px;
      padding: 12px;
      margin-top: 8px;
      cursor: pointer;
      width: 100%;
      -webkit-appearance: none;
    }
    .btn-ghost:active { opacity: 0.5; }

    .info-card {
      background: var(--card-bg);
      border-radius: 14px;
      padding: 20px;
      margin-bottom: 24px;
      text-align: left;
    }
    .info-card .label {
      font-size: 12px;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 0.08em;
      margin-bottom: 6px;
    }
    .info-card .value {
      font-size: 28px;
      font-weight: 300;
    }

    .result-card {
      background: var(--card-bg);
      border-radius: 14px;
      padding: 24px 20px;
      margin-bottom: 28px;
      text-align: left;
    }
    .result-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 10px 0;
      border-bottom: 1px solid var(--border);
    }
    .result-row:last-child { border-bottom: none; }
    .result-row .key { font-size: 13px; color: var(--muted); }
    .result-row .val { font-size: 15px; font-weight: 500; }

    .done-msg {
      font-size: 13px;
      color: var(--muted);
      margin-bottom: 20px;
    }
    .done-msg.success { color: #333; }
    .done-msg.error { color: #c00; }

    #settings { text-align: left; }
    .settings-title {
      font-size: 20px;
      font-weight: 600;
      margin-bottom: 28px;
    }
    .field { margin-bottom: 20px; }
    .field label {
      display: block;
      font-size: 12px;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 0.08em;
      margin-bottom: 8px;
    }
    .field input {
      width: 100%;
      padding: 14px;
      border: 1.5px solid var(--border);
      border-radius: 10px;
      font-size: 15px;
      background: var(--bg);
      color: var(--fg);
      -webkit-appearance: none;
      outline: none;
    }
    .field input:focus { border-color: var(--fg); }
    .field .hint {
      font-size: 11px;
      color: var(--muted);
      margin-top: 5px;
      line-height: 1.4;
    }

    .nav-gear {
      position: fixed;
      top: 20px;
      right: 20px;
      background: none;
      border: none;
      cursor: pointer;
      padding: 8px;
      -webkit-tap-highlight-color: transparent;
    }
    .nav-gear svg { display: block; }

    .hidden { display: none !important; }
  </style>
</head>
<body>

<button class="nav-gear" id="gearBtn" title="設定">
  <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="#888" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
    <circle cx="12" cy="12" r="3"/>
    <path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/>
  </svg>
</button>

<!-- 睡眠メイン画面 -->
<div id="main">
  <h1>睡眠記録</h1>
  <div class="time-display" id="clock">--:--</div>
  <div class="date-display" id="dateLabel"></div>

  <!-- 待機中 -->
  <div id="stateIdle">
    <button class="btn btn-primary" id="btnSleep">今から寝る</button>
    <button class="btn btn-ghost" id="btnSkipToPrep">準備を始める →</button>
  </div>

  <!-- 就寝中 -->
  <div id="stateSleeping" class="hidden">
    <div class="info-card">
      <div class="label">就寝</div>
      <div class="value" id="sleepStartLabel">--:--</div>
    </div>
    <button class="btn btn-primary" id="btnWake">起きた！</button>
    <button class="btn btn-outline btn-small" id="btnCancelSleep">キャンセル</button>
  </div>
</div>

<!-- 準備画面 -->
<div id="prep" class="hidden">
  <h1>準備</h1>
  <div class="time-display" id="clockPrep">--:--</div>
  <div class="date-display" id="dateLabelPrep"></div>

  <!-- 待機中 -->
  <div id="prepStateIdle">
    <button class="btn btn-primary" id="btnPrepStart">準備を始める</button>
    <button class="btn btn-ghost" id="btnPrepBackToSleep">← 睡眠画面に戻る</button>
  </div>

  <!-- 準備中 -->
  <div id="prepStateRunning" class="hidden">
    <div class="info-card">
      <div class="label">開始</div>
      <div class="value" id="prepStartLabel">--:--</div>
    </div>
    <button class="btn btn-primary" id="btnPrepDone">準備完了！</button>
    <button class="btn btn-outline btn-small" id="btnCancelPrep">キャンセル</button>
  </div>
</div>

<!-- 完了画面 -->
<div id="done" class="hidden">
  <h1 id="doneTitle">記録完了</h1>
  <div class="result-card">
    <div class="result-row">
      <span class="key" id="doneKeyStart">開始</span>
      <span class="val" id="doneStart">--:--</span>
    </div>
    <div class="result-row">
      <span class="key" id="doneKeyEnd">終了</span>
      <span class="val" id="doneEnd">--:--</span>
    </div>
    <div class="result-row">
      <span class="key" id="doneKeyDur">時間</span>
      <span class="val" id="doneDuration">--</span>
    </div>
  </div>
  <p class="done-msg" id="doneMsg">Googleカレンダーに登録中...</p>
  <button class="btn btn-primary" id="btnDoneNext" class="hidden">次へ：準備を始める</button>
  <button class="btn btn-outline" id="btnDoneBack">戻る</button>
</div>

<!-- 設定画面 -->
<div id="settings" class="hidden">
  <div class="settings-title">設定</div>

  <div class="field">
    <label>Google Client ID</label>
    <input type="text" id="inputClientId" placeholder="xxx.apps.googleusercontent.com" autocomplete="off" autocorrect="off" autocapitalize="off" spellcheck="false">
    <p class="hint">Google Cloud Console › OAuth 2.0 クライアント ID</p>
  </div>

  <div class="field">
    <label>カレンダー ID</label>
    <input type="text" id="inputCalendarId" placeholder="primary または xxx@group.calendar.google.com" autocomplete="off" autocorrect="off" autocapitalize="off" spellcheck="false">
    <p class="hint">Googleカレンダー設定 › カレンダーの統合 より確認</p>
  </div>

  <button class="btn btn-primary" id="btnSaveSettings">保存</button>
  <button class="btn btn-outline btn-small" id="btnBackFromSettings">戻る</button>
</div>

<script>
const STORE = {
  get: k => localStorage.getItem(k),
  set: (k, v) => localStorage.setItem(k, v),
  del: k => localStorage.removeItem(k),
};

function roundTo15(date) {
  const d = new Date(date);
  const mins = d.getMinutes() + d.getSeconds() / 60;
  d.setMinutes(Math.round(mins / 15) * 15, 0, 0);
  return d;
}

function fmtTime(date) {
  return date.toLocaleTimeString('ja-JP', { hour: '2-digit', minute: '2-digit', hour12: false });
}
function fmtDate(date) {
  return date.toLocaleDateString('ja-JP', { month: 'long', day: 'numeric', weekday: 'short' });
}
function fmtDuration(ms) {
  const totalMin = Math.round(ms / 60000);
  const h = Math.floor(totalMin / 60);
  const m = totalMin % 60;
  return m === 0 ? `${h}時間` : `${h}時間${m}分`;
}

function getConfig() {
  return {
    clientId:   STORE.get('clientId')   || '',
    calendarId: STORE.get('calendarId') || 'primary',
  };
}

// ---- OAuth ----
function redirectToAuth(pendingAction) {
  STORE.set('pendingAction', pendingAction);
  const cfg = getConfig();
  const redirectUri = location.origin + location.pathname;
  const params = new URLSearchParams({
    client_id:     cfg.clientId,
    redirect_uri:  redirectUri,
    response_type: 'token',
    scope:         'https://www.googleapis.com/auth/calendar.events',
  });
  location.href = 'https://accounts.google.com/o/oauth2/v2/auth?' + params;
}

function parseTokenFromHash() {
  const hash = location.hash.substring(1);
  if (!hash) return null;
  const p = new URLSearchParams(hash);
  const token = p.get('access_token');
  const expiresIn = p.get('expires_in');
  if (!token) return null;
  return { token, expiry: Date.now() + expiresIn * 1000 };
}

function getCachedToken() {
  const t = STORE.get('oauthToken');
  const e = STORE.get('oauthExpiry');
  if (t && e && +e > Date.now() + 60000) return t;
  return null;
}

function saveToken(obj) {
  STORE.set('oauthToken', obj.token);
  STORE.set('oauthExpiry', obj.expiry);
}

// ---- Clock ----
function updateClock() {
  const now = new Date();
  const t = fmtTime(now);
  const d = fmtDate(now);
  document.getElementById('clock').textContent = t;
  document.getElementById('dateLabel').textContent = d;
  document.getElementById('clockPrep').textContent = t;
  document.getElementById('dateLabelPrep').textContent = d;
}
setInterval(updateClock, 1000);
updateClock();

// ---- Screen management ----
const screens = ['main', 'prep', 'done', 'settings'];
function showScreen(id) {
  screens.forEach(s => document.getElementById(s).classList.add('hidden'));
  document.getElementById(id).classList.remove('hidden');
  document.getElementById('gearBtn').classList.toggle('hidden', id === 'settings');
}

// ---- 睡眠 ----
function updateSleepState() {
  const sleeping = STORE.get('sleepStart');
  document.getElementById('stateIdle').classList.toggle('hidden', !!sleeping);
  document.getElementById('stateSleeping').classList.toggle('hidden', !sleeping);
  if (sleeping) {
    document.getElementById('sleepStartLabel').textContent = fmtTime(roundTo15(new Date(+sleeping)));
  }
}

document.getElementById('btnSleep').addEventListener('click', () => {
  const cfg = getConfig();
  if (!cfg.clientId) { alert('設定からClient IDを入力してください。'); showScreen('settings'); return; }
  STORE.set('sleepStart', Date.now());
  updateSleepState();
});

document.getElementById('btnWake').addEventListener('click', () => {
  if (!STORE.get('sleepStart')) return;
  STORE.set('pendingWake', Date.now());
  const token = getCachedToken();
  token ? processSleepDone(token) : redirectToAuth('wake');
});

async function processSleepDone(token) {
  const sleepRaw = STORE.get('sleepStart');
  const wakeRaw  = STORE.get('pendingWake');
  if (!sleepRaw || !wakeRaw) return;

  const start = roundTo15(new Date(+sleepRaw));
  const end   = roundTo15(new Date(+wakeRaw));
  STORE.del('sleepStart');
  STORE.del('pendingWake');

  showDone('睡眠完了', '就寝', '起床', '睡眠時間', start, end);

  try {
    await createEvent(token, '睡眠', start, end);
    document.getElementById('doneMsg').textContent = 'カレンダーに登録しました ✓';
    document.getElementById('doneMsg').className = 'done-msg success';
    // 睡眠完了後は「準備を始める」ボタンを表示
    const nextBtn = document.getElementById('btnDoneNext');
    nextBtn.textContent = '次へ：準備を始める';
    nextBtn.classList.remove('hidden');
  } catch (e) {
    document.getElementById('doneMsg').textContent = '登録に失敗しました: ' + (e.message || e);
    document.getElementById('doneMsg').className = 'done-msg error';
  }
}

document.getElementById('btnCancelSleep').addEventListener('click', () => {
  if (confirm('就寝記録をキャンセルしますか？')) {
    STORE.del('sleepStart');
    STORE.del('pendingWake');
    updateSleepState();
  }
});

// ---- 準備 ----
function updatePrepState() {
  const running = STORE.get('prepStart');
  document.getElementById('prepStateIdle').classList.toggle('hidden', !!running);
  document.getElementById('prepStateRunning').classList.toggle('hidden', !running);
  if (running) {
    document.getElementById('prepStartLabel').textContent = fmtTime(roundTo15(new Date(+running)));
  }
}

document.getElementById('btnSkipToPrep').addEventListener('click', () => {
  showScreen('prep');
  updatePrepState();
});

document.getElementById('btnPrepBackToSleep').addEventListener('click', () => {
  showScreen('main');
  updateSleepState();
});

document.getElementById('btnPrepStart').addEventListener('click', () => {
  const cfg = getConfig();
  if (!cfg.clientId) { alert('設定からClient IDを入力してください。'); showScreen('settings'); return; }
  STORE.set('prepStart', Date.now());
  updatePrepState();
});

document.getElementById('btnPrepDone').addEventListener('click', () => {
  if (!STORE.get('prepStart')) return;
  STORE.set('pendingPrepEnd', Date.now());
  const token = getCachedToken();
  token ? processPrepDone(token) : redirectToAuth('prep');
});

async function processPrepDone(token) {
  const startRaw = STORE.get('prepStart');
  const endRaw   = STORE.get('pendingPrepEnd');
  if (!startRaw || !endRaw) return;

  const start = roundTo15(new Date(+startRaw));
  const end   = roundTo15(new Date(+endRaw));
  STORE.del('prepStart');
  STORE.del('pendingPrepEnd');

  showDone('準備完了', '開始', '終了', '所要時間', start, end);

  try {
    await createEvent(token, '準備', start, end);
    document.getElementById('doneMsg').textContent = 'カレンダーに登録しました ✓';
    document.getElementById('doneMsg').className = 'done-msg success';
    document.getElementById('btnDoneNext').classList.add('hidden');
  } catch (e) {
    document.getElementById('doneMsg').textContent = '登録に失敗しました: ' + (e.message || e);
    document.getElementById('doneMsg').className = 'done-msg error';
  }
}

document.getElementById('btnCancelPrep').addEventListener('click', () => {
  if (confirm('準備記録をキャンセルしますか？')) {
    STORE.del('prepStart');
    STORE.del('pendingPrepEnd');
    updatePrepState();
  }
});

// ---- 完了画面 ----
function showDone(title, keyStart, keyEnd, keyDur, start, end) {
  document.getElementById('doneTitle').textContent = title;
  document.getElementById('doneKeyStart').textContent = keyStart;
  document.getElementById('doneKeyEnd').textContent = keyEnd;
  document.getElementById('doneKeyDur').textContent = keyDur;
  document.getElementById('doneStart').textContent = fmtTime(start);
  document.getElementById('doneEnd').textContent   = fmtTime(end);
  const dur = end - start;
  document.getElementById('doneDuration').textContent = dur > 0 ? fmtDuration(dur) : '--';
  document.getElementById('doneMsg').textContent = 'Googleカレンダーに登録中...';
  document.getElementById('doneMsg').className = 'done-msg';
  document.getElementById('btnDoneNext').classList.add('hidden');
  showScreen('done');
}

document.getElementById('btnDoneNext').addEventListener('click', () => {
  showScreen('prep');
  updatePrepState();
});

document.getElementById('btnDoneBack').addEventListener('click', () => {
  showScreen('main');
  updateSleepState();
});

// ---- 設定 ----
function loadSettingsUI() {
  const cfg = getConfig();
  document.getElementById('inputClientId').value   = cfg.clientId;
  document.getElementById('inputCalendarId').value = cfg.calendarId;
}

document.getElementById('gearBtn').addEventListener('click', () => {
  loadSettingsUI();
  showScreen('settings');
});
document.getElementById('btnBackFromSettings').addEventListener('click', () => {
  showScreen('main');
  updateSleepState();
});
document.getElementById('btnSaveSettings').addEventListener('click', () => {
  const clientId   = document.getElementById('inputClientId').value.trim();
  const calendarId = document.getElementById('inputCalendarId').value.trim();
  if (!clientId) { alert('Client IDを入力してください'); return; }
  if (!calendarId) { alert('カレンダーIDを入力してください'); return; }
  STORE.set('clientId', clientId);
  STORE.set('calendarId', calendarId);
  STORE.del('oauthToken');
  STORE.del('oauthExpiry');
  alert('保存しました');
  showScreen('main');
  updateSleepState();
});

// ---- Google Calendar API ----
async function createEvent(token, summary, start, end) {
  const cfg = getConfig();
  const res = await fetch(
    `https://www.googleapis.com/calendar/v3/calendars/${encodeURIComponent(cfg.calendarId)}/events`,
    {
      method: 'POST',
      headers: { Authorization: `Bearer ${token}`, 'Content-Type': 'application/json' },
      body: JSON.stringify({
        summary,
        start: { dateTime: start.toISOString() },
        end:   { dateTime: end.toISOString() },
      }),
    }
  );
  if (!res.ok) {
    const err = await res.json().catch(() => ({}));
    throw new Error(err?.error?.message || `HTTP ${res.status}`);
  }
  return res.json();
}

// ---- 起動時処理 ----
window.addEventListener('load', () => {
  const tokenObj = parseTokenFromHash();
  if (tokenObj) {
    saveToken(tokenObj);
    history.replaceState(null, '', location.pathname);

    const action = STORE.get('pendingAction');
    STORE.del('pendingAction');

    if (action === 'wake') { processSleepDone(tokenObj.token); return; }
    if (action === 'prep') { processPrepDone(tokenObj.token); return; }
  }

  const cfg = getConfig();
  if (!cfg.clientId) {
    loadSettingsUI();
    showScreen('settings');
    return;
  }

  // 準備中だった場合は準備画面へ
  if (STORE.get('prepStart')) {
    showScreen('prep');
    updatePrepState();
    return;
  }

  showScreen('main');
  updateSleepState();
});
</script>
</body>
</html>
